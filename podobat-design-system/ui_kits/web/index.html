<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Podobat Web UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  html, body { margin:0; background:#fff; }
  button { font-family: var(--font-sans); }
  ::-webkit-scrollbar { width:10px; height:10px; }
  ::-webkit-scrollbar-thumb { background:#cac7cd; border-radius:8px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="Nav.jsx"></script>
<script type="text/babel" src="Banner.jsx"></script>
<script type="text/babel" src="MainLinks.jsx"></script>
<script type="text/babel" src="Board.jsx"></script>
<script type="text/babel" src="EduMethod.jsx"></script>
<script type="text/babel" src="Courses.jsx"></script>
<script type="text/babel" src="About.jsx"></script>
<script type="text/babel" src="Notices.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>
<script type="text/babel">
function App() {
  const [route, setRoute] = React.useState(localStorage.getItem('podobat-route') || 'home');
  const goto = (r) => { setRoute(r); localStorage.setItem('podobat-route', r); window.scrollTo(0,0); };
  const [path, query] = route.split('?');
  const tab = (query || '').split('=')[1] || '';

  return (
    <div data-screen-label={path}>
      <Nav route={route} goto={goto} />
      {path === 'home' && (
        <>
          <Banner />
          <MainLinks goto={goto} />
          <Board />
          <EduMethod />
        </>
      )}
      {path === 'about'   && <About   initialTab={tab} />}
      {path === 'courses' && <Courses initialTab={tab} />}
      {path === 'notices' && <Notices initialTab={tab} />}
      <Footer />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
