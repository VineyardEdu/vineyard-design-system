<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="_base.css">
<link rel="stylesheet" href="../components/toast.css">
<style>
  /* preview-only layout */
  body { padding: 20px; background: #fafafc; }
  .stack { display:flex; flex-direction:column; gap:12px; }
</style></head>
<body><div class="card">
  <div class="stack">

    <div class="toast toast--err"><img class="toast__icon" src="../assets/alert-circle-fill.svg"><span>네트워크 오류입니다. 다시 시도해 주세요.</span></div>
  </div>
