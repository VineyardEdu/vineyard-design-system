<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  body { padding: 16px; }
  .grid { display:grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
  .ic { display:flex; flex-direction:column; align-items:center; gap:6px; background:var(--color-gray-6); border-radius: 10px; padding: 10px 4px; }
  .ic img { width:48px; height:48px; object-fit:contain; }
  .ic span { font-size:10px; color:var(--fg-subtle); font-family:'SF Mono',ui-monospace,monospace; }
</style></head>
<body><div class="card">
  <div class="grid">
    <div class="ic"><img src="../assets/3dcon/idea.png"><span>idea</span></div>
    <div class="ic"><img src="../assets/3dcon/books.png"><span>books</span></div>
    <div class="ic"><img src="../assets/3dcon/pen.png"><span>pen</span></div>
    <div class="ic"><img src="../assets/3dcon/papers.png"><span>papers</span></div>
    <div class="ic"><img src="../assets/3dcon/star.png"><span>star</span></div>
    <div class="ic"><img src="../assets/3dcon/puzzle.png"><span>puzzle</span></div>
    <div class="ic"><img src="../assets/3dcon/steps.png"><span>steps</span></div>
    <div class="ic"><img src="../assets/3dcon/arrow.png"><span>arrow</span></div>
    <div class="ic"><img src="../assets/3dcon/clock.png"><span>clock</span></div>
    <div class="ic"><img src="../assets/3dcon/list.png"><span>list</span></div>
    <div class="ic"><img src="../assets/3dcon/magnifier.png"><span>magnifier</span></div>
    <div class="ic"><img src="../assets/logo/kakao-talk-logo.svg"><span>kakao</span></div>
  </div>
</div></body></html>
