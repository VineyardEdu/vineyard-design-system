<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="_base.css">
<link rel="stylesheet" href="../components/subject-tiles.css">
<style>
  /* preview-only layout */
  body { padding: 16px; background: #f8f8fb; }
  .row { display:grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
</style></head>
<body><div class="card">
  <div class="row">
    <div class="tile tile--blue">
      <span class="tile__kicker tile__kicker--blue">초등 논술</span>
      <h4 class="tile__title">구조 따라 생각을<br>펼치는 글쓰기</h4>
      <p class="tile__desc">관찰 · 비교 · 해석</p>
    </div>
    <div class="tile tile--green">
      <span class="tile__kicker tile__kicker--green">중등 국어</span>
      <h4 class="tile__title">개념 따라 낯선<br>작품 보는 국어</h4>
      <p class="tile__desc">문학 · 비문학 · 문법</p>
    </div>
    <div class="tile tile--red">
      <span class="tile__kicker tile__kicker--red">중등 논술</span>
      <h4 class="tile__title">세상의 관찰에서<br>나의 세계로</h4>
      <p class="tile__desc">사유 · 논증 · 표현</p>
    </div>
  </div>
</div></body></html>
