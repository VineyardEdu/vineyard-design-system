<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  body { padding: 16px; }
  .weights { display:grid; grid-template-columns: repeat(3, 1fr); gap: 8px 16px; }
  .w { display:flex; flex-direction:column; }
  .w .name { font-size:10px; font-family:'SF Mono',ui-monospace,monospace; color:var(--fg-subtle); }
  .w .sample { font-size:20px; line-height:28px; color:var(--fg); letter-spacing:-.002em; }
</style></head>
<body><div class="card">
  <div class="weights">
    <div class="w"><span class="name">100 Thin</span><span class="sample" style="font-weight:100">포도밭 국어논술 Podobat</span></div>
    <div class="w"><span class="name">300 Light</span><span class="sample" style="font-weight:300">포도밭 국어논술 Podobat</span></div>
    <div class="w"><span class="name">400 Regular</span><span class="sample" style="font-weight:400">포도밭 국어논술 Podobat</span></div>
    <div class="w"><span class="name">500 Medium</span><span class="sample" style="font-weight:500">포도밭 국어논술 Podobat</span></div>
    <div class="w"><span class="name">600 SemiBold</span><span class="sample" style="font-weight:600">포도밭 국어논술 Podobat</span></div>
    <div class="w"><span class="name">700 Bold</span><span class="sample" style="font-weight:700">포도밭 국어논술 Podobat</span></div>
    <div class="w"><span class="name">800 ExtraBold</span><span class="sample" style="font-weight:800">포도밭 국어논술 Podobat</span></div>
    <div class="w"><span class="name">900 Black</span><span class="sample" style="font-weight:900">포도밭 국어논술 Podobat</span></div>
    <div class="w"><span class="name">Pretendard</span><span class="sample" style="font-weight:400;color:var(--color-primary-0)">완전한 9-weight 한글+Latin</span></div>
  </div>
</div></body></html>
