<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="_base.css">
<link rel="stylesheet" href="../components/form-inputs.css">
<style>
  /* preview-only layout */
  body { padding: 20px; }
  .grid { display:grid; grid-template-columns: 1fr 1fr; gap:14px; }
</style></head>
<body><div class="card">
  <div class="grid">
    <div class="field">
      <label class="field__label">이름</label>
      <input class="field__input" placeholder="홍길동" value="김하영">
    </div>
    <div class="field">
      <label class="field__label">연락처</label>
      <input class="field__input field__input--error" placeholder="010-0000-0000" value="010-12">
      <span class="field__error">• 올바른 번호를 입력해 주세요</span>
    </div>
    <div class="field">
      <label class="field__label">학년</label>
      <select class="field__input"><option>초등 5학년</option></select>
    </div>
    <div class="field">
      <label class="field__label">문의 내용</label>
      <input class="field__input" placeholder="어떤 과정이 궁금하세요?">
    </div>
  </div>
</div></body></html>
