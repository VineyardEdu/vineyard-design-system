<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="_base.css">
<link rel="stylesheet" href="../components/dropdown.css">
<style>
  /* preview-only layout */
  body { padding: 20px; }
  .row { display:flex; gap:24px; align-items:flex-start; }
  .dropdown { width: 260px; }
</style></head>
<body><div class="card">
  <div class="row">
    <div class="dropdown">
      <button class="dropdown__trigger">
        <span>초등 논술</span>
        <span class="dropdown__chev">⌃</span>
      </button>
      <div class="dropdown__menu">
        <div class="dropdown__opt">전체</div>
        <div class="dropdown__opt dropdown__opt--active">초등 논술</div>
        <div class="dropdown__opt">중등 논술</div>
        <div class="dropdown__opt">중등 국어</div>
      </div>
    </div>
    <div style="font-size:12px;color:var(--fg-subtle);margin-top:12px;max-width:260px;line-height:18px">
      Custom select — open state uses primary-0 border, active option fills primary-1 with white text. Closed hover brightens border to gray-4.
    </div>
  </div>
</div></body></html>
