<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Podobat Mobile UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  html, body { margin:0; background:#ece9ef; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:40px 0; box-sizing:border-box; }
  button { font-family: var(--font-sans); }
  ::-webkit-scrollbar { width:0; height:0; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="MobileNav.jsx"></script>
<script type="text/babel" src="MobileDrawer.jsx"></script>
<script type="text/babel" src="MobileBanner.jsx"></script>
<script type="text/babel" src="MobileLinks.jsx"></script>
<script type="text/babel" src="MobileBoard.jsx"></script>
<script type="text/babel" src="MobileEduMethod.jsx"></script>
<script type="text/babel" src="MobileAbout.jsx"></script>
<script type="text/babel" src="MobileCourses.jsx"></script>
<script type="text/babel" src="MobileNotices.jsx"></script>
<script type="text/babel" src="MobileFooter.jsx"></script>
<script type="text/babel">
function App() {
  const [route, setRoute] = React.useState(localStorage.getItem('podobat-m-route') || 'home');
  const [drawerOpen, setDrawerOpen] = React.useState(false);
  const scrollRef = React.useRef(null);
  const goto = (r) => {
    setRoute(r);
    localStorage.setItem('podobat-m-route', r);
    if (scrollRef.current) scrollRef.current.scrollTop = 0;
  };
  const [path, query] = route.split('?');
  const tab = (query || '').split('=')[1] || '';

  return (
    <IOSDevice width={375} height={812}>
      <div ref={scrollRef} data-screen-label={path} style={{
        background:'#fff', minHeight:'100%', position:'relative',
        fontFamily:'var(--font-sans)',
        paddingTop:59, /* iOS status bar + dynamic island safe area */
      }}>
        <MobileNav onMenu={()=>setDrawerOpen(true)} />
        {path === 'home' && (
          <>
            <MobileBanner />
            <MobileLinks goto={goto} />
            <MobileBoard />
            <MobileEduMethod />
          </>
        )}
        {path === 'about'   && <MobileAbout   initialTab={tab} />}
        {path === 'courses' && <MobileCourses initialTab={tab} />}
        {path === 'notices' && <MobileNotices initialTab={tab} />}
        <MobileFooter />
        <MobileDrawer open={drawerOpen} onClose={()=>setDrawerOpen(false)} route={route} goto={goto} />
      </div>
    </IOSDevice>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
