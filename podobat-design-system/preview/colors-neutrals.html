<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  body { padding: 16px; }
  .ramp { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .swatch { min-height: 80px; border-radius: 8px; padding: 8px; display:flex; flex-direction:column; justify-content: space-between; }
  .name { font-size: 11px; font-weight: 600; }
  .hex { font-size: 10px; opacity:.75; font-family: 'SF Mono', ui-monospace, monospace; }
</style></head>
<body><div class="card">
  <div class="ramp">
    <div class="swatch" style="background:#312e34;color:#fff"><span class="name">gray-0</span><span class="hex">#312e34</span></div>
    <div class="swatch" style="background:#474c51;color:#fff"><span class="name">gray-1</span><span class="hex">#474c51</span></div>
    <div class="swatch" style="background:#5d5d5d;color:#fff"><span class="name">gray-2</span><span class="hex">#5d5d5d</span></div>
    <div class="swatch" style="background:#8d8598;color:#fff"><span class="name">gray-3</span><span class="hex">#8d8598</span></div>
    <div class="swatch" style="background:#cac7cd"><span class="name">gray-4</span><span class="hex">#cac7cd</span></div>
    <div class="swatch" style="background:#e0e0e8"><span class="name">gray-5</span><span class="hex">#e0e0e8</span></div>
    <div class="swatch" style="background:#f2f2f5;border:1px solid #e0e0e8"><span class="name">gray-6</span><span class="hex">#f2f2f5</span></div>
  </div>
  <div class="small" style="margin-top:10px">Body text 0–2 · muted 3 · disabled 4 · border 5 · surface-alt 6</div>
</div></body></html>
