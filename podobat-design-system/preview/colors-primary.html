<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  body { padding: 16px; }
  .stack { display: flex; flex-direction: column; gap: 10px; }
  .swatch { min-height: 64px; color: #fff; }
  .swatch.light { color: var(--fg); }
  .label-row { display:flex; justify-content: space-between; align-items: baseline; }
</style></head>
<body><div class="card stack">
  <div class="row">
    <div class="swatch" style="background:#695189">
      <div class="label-row"><span class="name">primary-0</span><span class="hex">#695189</span></div>
    </div>
    <div class="swatch" style="background:#6e5dc7">
      <div class="label-row"><span class="name">primary-1</span><span class="hex">#6e5dc7</span></div>
    </div>
    <div class="swatch light" style="background:#eae7ff">
      <div class="label-row"><span class="name">primary-2</span><span class="hex">#eae7ff</span></div>
    </div>
    <div class="swatch" style="background:#fd5d0e">
      <div class="label-row"><span class="name">secondary-0</span><span class="hex">#fd5d0e</span></div>
    </div>
  </div>
  <div class="small">Deep violet headings · indigo links & CTA · lavender hover · orange for errors/callouts only</div>
</div></body></html>
