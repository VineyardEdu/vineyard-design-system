<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  body { padding: 20px; }
  .row { display:flex; gap:28px; align-items:center; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { border-radius: 50%; border-style: solid; border-color: var(--color-gray-5); position:relative; }
  .spinner::after {
    content:''; position:absolute; inset:-2px; border-radius:50%;
    border: inherit; border-color: transparent;
    border-top-color: var(--color-primary-1);
    animation: spin 1s linear infinite;
  }
  .sm { width:16px; height:16px; border-width:2px; }
  .md { width:32px; height:32px; border-width:2px; }
  .lg { width:40px; height:40px; border-width:2px; }
  .xl { width:48px; height:48px; border-width:4px; }
  .lbl { font-size:11px; color:var(--fg-subtle); font-family:'SF Mono',ui-monospace,monospace; margin-top:6px; text-align:center; }
  .col { display:flex; flex-direction:column; align-items:center; }
</style></head>
<body><div class="card">
  <div class="row">
    <div class="col"><div class="spinner sm"></div><div class="lbl">sm 16</div></div>
    <div class="col"><div class="spinner md"></div><div class="lbl">md 32</div></div>
    <div class="col"><div class="spinner lg"></div><div class="lbl">lg 40</div></div>
    <div class="col"><div class="spinner xl"></div><div class="lbl">xl 48</div></div>
    <div class="col" style="margin-left:20px">
      <div class="spinner md"></div>
      <div style="margin-top:8px; font-size:12px; color:var(--color-gray-1); font-weight:500">불러오는 중…</div>
    </div>
  </div>
</div></body></html>
