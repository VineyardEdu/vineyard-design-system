<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  body { padding: 20px; }
  .row { display:flex; gap:14px; flex-wrap:wrap; }
  .logo-box { display:flex; flex-direction:column; gap:6px; align-items:flex-start; }
  .logo-box img { height: 28px; display: block; }
  .dark { background: var(--color-primary-0); padding: 10px 16px; border-radius: 8px; display: inline-flex; align-items: center; }
  .dark img { filter: brightness(0) invert(1); }
  .name { font-size: 11px; color: var(--fg-subtle); font-family:'SF Mono',ui-monospace,monospace; }
</style></head>
<body><div class="card">
  <div class="row">
    <div class="logo-box"><img src="../assets/logo.svg"><span class="name">logo · light</span></div>
    <div class="logo-box"><div class="dark"><img src="../assets/logo.svg"></div><span class="name">logo · on primary</span></div>
  </div>
</div></body></html>
