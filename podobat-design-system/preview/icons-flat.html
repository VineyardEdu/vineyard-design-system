<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  body { padding: 16px; }
  .grid { display:grid; grid-template-columns: repeat(8, 1fr); gap: 10px; }
  .ic { display:flex; flex-direction:column; align-items:center; gap:6px; padding: 10px 4px; border:1px solid var(--border); border-radius: 8px; }
  .ic img { width:24px; height:24px; }
  .ic span { font-size:10px; color:var(--fg-subtle); font-family:'SF Mono',ui-monospace,monospace; }
</style></head>
<body><div class="card">
  <div class="grid">
    <div class="ic"><img src="../assets/home.svg"><span>home</span></div>
    <div class="ic"><img src="../assets/menu.svg"><span>menu</span></div>
    <div class="ic"><img src="../assets/search.svg"><span>search</span></div>
    <div class="ic"><img src="../assets/close.svg"><span>close</span></div>
    <div class="ic"><img src="../assets/plus.svg"><span>plus</span></div>
    <div class="ic"><img src="../assets/check.svg"><span>check</span></div>
    <div class="ic"><img src="../assets/chevron-left.svg"><span>chev-L</span></div>
    <div class="ic"><img src="../assets/chevron-right.svg"><span>chev-R</span></div>
    <div class="ic"><img src="../assets/chevron-up.svg"><span>chev-U</span></div>
    <div class="ic"><img src="../assets/download.svg"><span>download</span></div>
    <div class="ic"><img src="../assets/book.svg"><span>book</span></div>
    <div class="ic"><img src="../assets/message-square.svg"><span>msg</span></div>
    <div class="ic"><img src="../assets/pencil.svg"><span>pencil</span></div>
    <div class="ic"><img src="../assets/smiley.svg"><span>smiley</span></div>
    <div class="ic"><img src="../assets/sun.svg"><span>sun</span></div>
    <div class="ic"><img src="../assets/spark.svg"><span>spark</span></div>
  </div>
</div></body></html>
