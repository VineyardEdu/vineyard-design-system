<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  body { padding: 16px; }
  .scale { display:flex; align-items:flex-end; gap:6px; }
  .tick { display:flex; flex-direction:column; align-items:center; gap:4px; }
  .bar { background: var(--color-primary-1); border-radius: 2px; width: 18px; }
  .n { font-size:10px; color:var(--fg-subtle); font-family:'SF Mono',ui-monospace,monospace; }
  .px { font-size:9px; color:var(--fg-subtle); font-family:'SF Mono',ui-monospace,monospace; }
</style></head>
<body><div class="card">
  <div class="scale">
    <div class="tick"><div class="bar" style="height:4px"></div><span class="n">1</span><span class="px">4</span></div>
    <div class="tick"><div class="bar" style="height:8px"></div><span class="n">2</span><span class="px">8</span></div>
    <div class="tick"><div class="bar" style="height:12px"></div><span class="n">3</span><span class="px">12</span></div>
    <div class="tick"><div class="bar" style="height:16px"></div><span class="n">4</span><span class="px">16</span></div>
    <div class="tick"><div class="bar" style="height:20px"></div><span class="n">5</span><span class="px">20</span></div>
    <div class="tick"><div class="bar" style="height:24px"></div><span class="n">6</span><span class="px">24</span></div>
    <div class="tick"><div class="bar" style="height:32px"></div><span class="n">8</span><span class="px">32</span></div>
    <div class="tick"><div class="bar" style="height:40px"></div><span class="n">10</span><span class="px">40</span></div>
    <div class="tick"><div class="bar" style="height:48px"></div><span class="n">12</span><span class="px">48</span></div>
    <div class="tick"><div class="bar" style="height:56px"></div><span class="n">14</span><span class="px">56</span></div>
    <div class="tick"><div class="bar" style="height:64px"></div><span class="n">16</span><span class="px">64</span></div>
    <div class="tick"><div class="bar" style="height:80px"></div><span class="n">20</span><span class="px">80</span></div>
  </div>
  <div class="small" style="margin-top:10px">4px base. Card pad = 4–6, section gap = 8–12, hero pad = 16–20.</div>
</div></body></html>
