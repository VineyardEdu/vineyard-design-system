<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  body { padding: 20px; }
  .row { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
  .btn { font-family: var(--font-sans); font-weight:600; letter-spacing:-.002em; border-radius: 12px; padding: 10px 20px; font-size:15px; border:1px solid transparent; cursor:pointer; transition: background .2s, box-shadow .2s; }
  .primary { background: var(--color-primary-0); color:#fff; }
  .primary:hover { background: linear-gradient(0deg, rgba(49,46,52,.4), rgba(49,46,52,.4)), var(--color-primary-0); }
  .secondary { background: #fff; color: var(--color-primary-0); border-color: var(--border); }
  .secondary:hover { background: var(--color-primary-2); border-color: var(--color-primary-40); }
  .ghost { background: transparent; color: var(--color-primary-1); }
  .ghost:hover { color: var(--color-primary-0); text-decoration: underline; }
  .disabled { background: var(--color-gray-4); color:#fff; cursor:not-allowed; }
  .small { font-size:12px; padding:6px 12px; border-radius:8px; }
</style></head>
<body><div class="card">
  <div class="row">
    <button class="btn primary">자세히 보기</button>
    <button class="btn secondary">문의하기</button>
    <button class="btn ghost">더 알아보기 →</button>
    <button class="btn primary small">+ 접수</button>
    <button class="btn disabled">비활성</button>
  </div>
</div></body></html>
